# All hyperparameters live here, not in code

model:
  base_model_name: ""   # e.g. "gpt2", "meta-llama/Llama-3-8b"
  hidden_dropout: 0.1

data:
  train_path: ""
  eval_path: ""
  max_length: 512

training:
  seed: 42
  batch_size: 8
  learning_rate: 1.0e-5
  num_epochs: 3
  weight_decay: 0.01
  warmup_ratio: 0.03
  gradient_accumulation_steps: 1

logging:
  log_dir: "logs"
  log_every_n_steps: 50

device: "cuda"
